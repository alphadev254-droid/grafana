apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    jsonData:
      derivedFields:
        - name: requestId
          matcherRegex: '"requestId":"([^"]+)"'
          url: '/d/icims-logs/icims-logs?from=${__from}&to=${__to}&var-level=.*&var-event=.*&var-requestId=$${__value.raw}&var-route=&var-statusCode=&var-userId=&var-churchId='
          urlDisplayLabel: 'Open request logs'

  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki
      tracesToMetrics:
        datasourceUid: prometheus
