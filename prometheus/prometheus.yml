global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["prometheus:9090"]

  - job_name: alloy
    static_configs:
      - targets: ["alloy:12345"]

  - job_name: node-app
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:4000"]

  - job_name: laravel-app
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]
